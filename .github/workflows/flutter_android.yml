name: Flutter Android CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.8'

      - name: Install dependencies
        run: flutter pub get

      # 1. Reconstruct all configuration files from Secrets
      - name: Reconstruct Configuration Files
        run: |
          # Create Firebase Options (using the raw text secret you pasted)
          echo "${{ secrets.FIREBASE_OPTIONS }}" > lib/firebase_options.dart
          
          # Create the .jks file from base64
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          
          # Create key.properties for signing
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Analyze code
        run: flutter analyze

      - name: Increment version code
        id: version
        run: |
          current_code=$(grep "version:" pubspec.yaml | sed 's/.*+//')
          new_code=$((current_code + 1))
          echo "new_version_code=$new_code" >> $GITHUB_OUTPUT
          sed -i "s/+${current_code}/+${new_code}/" pubspec.yaml

      # 2. Build the signed APK
      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/app-release-v${{ steps.version.outputs.new_version_code }}.apk

      # 3. Upload the APK as a GitHub Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-v${{ steps.version.outputs.new_version_code }}
          path: build/app/outputs/flutter-apk/app-release-v${{ steps.version.outputs.new_version_code }}.apk
