name: quickcng
description: "QuickCNG - Find CNG stations near you."
publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.10.7



dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  url_launcher: ^6.2.5
  flutter_riverpod: ^3.2.1
  firebase_auth: ^6.1.4
  http: ^1.6.0
  geolocator: ^13.0.0
  go_router: ^14.0.0
  latlong2: ^0.9.1
  google_sign_in: ^6.2.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  flutter_launcher_icons: ^0.14.4

  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.0


  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0

#

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  assets:
    - assets/images/logoCng.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logoCng.png"

flutter_native_splash:
  color: "#ffffff" # Or your theme color
  image: assets/images/logoCng.png
  android_12:
    image: assets/images/logoCng.png
    color: "#ffffff"